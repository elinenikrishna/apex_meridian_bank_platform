name: apex-meridian-bank-intelligence

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env.example
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    depends_on:
      - postgres
      - kafka

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apex_meridian
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./pipelines/sql/ddl:/docker-entrypoint-initdb.d:ro

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: apex_operational
      MYSQL_USER: apex
      MYSQL_PASSWORD: apex_local_password
      MYSQL_ROOT_PASSWORD: apex_root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  cassandra:
    image: cassandra:5
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: apexminio
      MINIO_ROOT_PASSWORD: apexminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  airflow:
    build:
      context: .
      dockerfile: infrastructure/docker/airflow.Dockerfile
    profiles: ["orchestration"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://apex:apex_local_password@postgres:5432/apex_meridian
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./pipelines/airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./scripts:/opt/airflow/scripts
    command: standalone
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres-data:
  mysql-data:
  mongo-data:
  cassandra-data:
  minio-data:

