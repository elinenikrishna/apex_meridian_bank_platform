name: Apex Meridian CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: src:.
        run: python -m pytest -q
      - name: Generate smoke data
        env:
          PYTHONPATH: src:.
        run: python -m apex_meridian.data_generation.generator --records 1000 --batch-size 500 --domains transactions,customers,merchants --output data/generated/ci_smoke

  docker-build:
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t apex-meridian-api:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t apex-meridian-frontend:ci .

